name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary with Python backend
        run: |
          mkdir -p dist
          cp target/release/vaspsetup dist/
          cp -r vaspsetup_core dist/
          cd dist
          tar czf "../vaspsetup-${TAG_NAME}-linux-x86_64.tar.gz" vaspsetup vaspsetup_core/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "vaspsetup-${{ env.TAG_NAME }}-linux-x86_64.tar.gz"
          body: |
            ## Install

            ```bash
            pip install git+https://github.com/mappoh/vaspsetup-ase.git
            ```

            The binary is downloaded automatically on first run.

            Or download the tarball directly and run `./vaspsetup`.
